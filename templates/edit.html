{% extends "dashboard_layout.html" %}
{% block content %}

<div class="entry-wrapper">

    <div class="entry-card">

        <h2 class="entry-title">
            Edit Performance Entry
        </h2>

        <form method="POST" class="entry-form">

            <div class="form-group">
                <label>Study Hours</label>
                <input
                    type="number"
                    step="0.1"
                    name="study"
                    value="{{ entry.study_hours }}"
                    min="0"
                    max="24"
                    required>
            </div>

            <div class="form-group">
                <label>Social Media Hours</label>
                <input
                    type="number"
                    step="0.1"
                    name="social"
                    value="{{ entry.social_media }}"
                    min="0"
                    max="24"
                    required>
            </div>

            <div class="form-group">
                <label>Attendance (%)</label>
                <input
                    type="number"
                    step="0.1"
                    name="attendance"
                    value="{{ entry.attendance }}"
                    min="0"
                    max="100"
                    required>
            </div>

            <div class="form-group">
                <label>Sleep Hours</label>
                <input
                    type="number"
                    step="0.1"
                    name="sleep"
                    value="{{ entry.sleep }}"
                    min="0"
                    max="24"
                    required>
            </div>

            <div class="form-group">
                <label>Mental Health (1–10)</label>
                <input
                    type="number"
                    step="0.1"
                    name="mental"
                    value="{{ entry.mental_health }}"
                    min="1"
                    max="10"
                    required>
            </div>

            <div class="form-group full">

                <button type="submit" class="submit-btn">
                    Update Entry
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
